<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Task Tracker · Sparta</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
/* ── Sparta Design Tokens ── */
:root {
  --red:       #E8282B;
  --red-dark:  #C41E21;
  --red-light: #FFF0F0;
  --crimson:   #8B1A1A;
  --purple:    #7C3AED;
  --purple-bg: #F5F3FF;
  --gray-bg:   #F7F7F8;
  --gray-100:  #F2F2F3;
  --gray-200:  #E4E4E7;
  --gray-400:  #A1A1AA;
  --gray-600:  #52525B;
  --gray-800:  #27272A;
  --white:     #FFFFFF;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--gray-bg); color: var(--gray-800); min-height: 100vh;
  font-size: 14px; line-height: 1.5;
}

/* ── Header ── */
header {
  background: var(--white); color: var(--gray-800);
  padding: 0 28px; height: 60px;
  display: flex; align-items: center; gap: 24px;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid var(--gray-200);
  box-shadow: var(--shadow-sm);
}
.logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 800; color: var(--gray-800); white-space: nowrap; letter-spacing: -.4px; }
.logo-tag { background: var(--red); color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .03em; }
nav { display: flex; gap: 2px; }
nav button {
  padding: 7px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 13px; font-weight: 600; background: transparent; color: var(--gray-400);
  transition: all .15s; font-family: inherit;
}
nav button.active { background: var(--red-light); color: var(--red); }
nav button:hover:not(.active) { background: var(--gray-100); color: var(--gray-800); }
.header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
#sync-btn {
  padding: 7px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
  background: var(--white); color: var(--gray-600); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
#sync-btn:hover { border-color: var(--red); color: var(--red); }
#sync-status { font-size: 11px; color: var(--gray-400); }

/* ── Tabs ── */
.tab { display: none; padding: 24px 28px; min-height: calc(100vh - 60px); }
.tab.active { display: block; }

/* ── Section header ── */
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sh h2 { font-size: 16px; font-weight: 800; color: var(--gray-800); letter-spacing: -.3px; }

/* ── Buttons ── */
.btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 700; transition: all .15s; font-family: inherit; }
.btn-primary { background: var(--red); color: white; }
.btn-primary:hover { background: var(--red-dark); }
.btn-ghost { background: var(--white); color: var(--gray-600); border: 1.5px solid var(--gray-200); }
.btn-ghost:hover { background: var(--gray-100); border-color: var(--gray-400); }
.btn-danger { background: var(--red-light); color: var(--red); border: none; }
.btn-danger:hover { background: #FFE0E0; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }

/* ── Kanban ── */
.kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
.kanban-col { background: var(--gray-100); border-radius: var(--radius-lg); padding: 14px; min-height: 200px; }
.kanban-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 4px; }
.kanban-col-title { font-size: 13px; font-weight: 800; letter-spacing: -.2px; }
.kanban-count { background: white; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; color: var(--gray-600); box-shadow: var(--shadow-sm); }
.col-planned     .kanban-col-title { color: var(--gray-600); }
.col-in_progress .kanban-col-title { color: #D97706; }
.col-done        .kanban-col-title { color: #059669; }
.kanban-card {
  background: var(--white); border-radius: var(--radius-md); padding: 16px;
  box-shadow: var(--shadow-sm); margin-bottom: 10px;
  border-left: 4px solid var(--gray-200); cursor: pointer;
  transition: box-shadow .2s, transform .15s;
}
.kanban-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.kanban-card.overdue   { border-left-color: var(--red); }
.kanban-card.due-soon  { border-left-color: #F59E0B; }
.kanban-card.on-track  { border-left-color: #10B981; }
.kc-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; color: var(--gray-800); letter-spacing: -.2px; }
.kc-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.eta-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 99px; }
.eta-overdue { background: var(--red-light); color: var(--red); }
.eta-soon    { background: #FEF3C7; color: #92400E; }
.eta-ok      { background: #D1FAE5; color: #065F46; }
.eta-none    { background: var(--gray-100); color: var(--gray-400); }
.progress-wrap { margin-bottom: 10px; }
.progress-bar { background: var(--gray-200); border-radius: 99px; height: 5px; margin-bottom: 5px; }
.progress-fill { border-radius: 99px; height: 5px; transition: width .4s; background: var(--red); }
.progress-label { font-size: 11px; color: var(--gray-400); font-weight: 500; }
.kc-preview { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.kc-chip { font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-weight: 600; }
.chip-done        { background: #D1FAE5; color: #065F46; }
.chip-in_progress { background: #FEF9C3; color: #92400E; }
.chip-not_started { background: var(--gray-100); color: var(--gray-400); }
.chip-na          { background: var(--gray-100); color: var(--gray-400); opacity: .6; }
.kc-actions { display: flex; gap: 6px; justify-content: space-between; align-items: center; }
.kc-move { display: flex; gap: 4px; }

/* ── Matrix ── */
.matrix-wrap { overflow: auto; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); max-height: calc(100vh - 140px); }
table { border-collapse: collapse; background: white; min-width: 100%; }
thead th {
  background: var(--crimson); color: white; padding: 11px 14px; font-size: 12px;
  font-weight: 700; text-align: center; white-space: nowrap;
  position: sticky; top: 0; z-index: 10; letter-spacing: -.1px;
}
thead th.row-header { text-align: left; min-width: 200px; position: sticky; left: 0; z-index: 20; background: var(--gray-800); }
thead th.task-col { min-width: 110px; cursor: pointer; }
thead th.task-col:hover { background: var(--red-dark); }
.col-pct { display: block; font-size: 10px; color: rgba(255,255,255,.6); margin-top: 2px; font-weight: 400; }
tbody tr:nth-child(even) td { background: #FAFAFA; }
tbody tr:nth-child(odd) td { background: white; }
tbody td { padding: 7px 10px; text-align: center; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
tbody td.row-header { text-align: left; font-weight: 600; padding: 7px 14px; position: sticky; left: 0; z-index: 5; white-space: nowrap; }
.track-row td { background: var(--red-light) !important; font-size: 11px; color: var(--red-dark); font-weight: 800; padding: 5px 14px; letter-spacing: .04em; text-transform: uppercase; }
.status-cell { display: inline-block; border-radius: 6px; padding: 5px 4px; width: 34px; cursor: pointer; font-size: 16px; user-select: none; transition: transform .1s; }
.status-cell:hover { transform: scale(1.25); }
.s-not_started { background: var(--gray-100); }
.s-in_progress { background: #FEF9C3; }
.s-done        { background: #D1FAE5; }
.s-na          { background: var(--gray-100); opacity: .4; }

/* ── Grade badges ── */
.grade-s     { background: #EDE9FE; color: #6D28D9; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-right: 4px; }
.grade-a     { background: #DBEAFE; color: #1D4ED8; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-right: 4px; }
.grade-named { background: #FEF3C7; color: #92400E; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-right: 4px; }
.grade-b     { background: var(--gray-100); color: var(--gray-600); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 4px; }

/* ── Toggle group ── */
.toggle-group { margin-bottom: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius-md); overflow: hidden; }
.toggle-group-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--gray-100); cursor: pointer; user-select: none; transition: background .15s; }
.toggle-group-header:hover { background: var(--gray-200); }
.toggle-group-title { font-size: 12px; font-weight: 800; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
.toggle-group-count { font-size: 11px; color: var(--gray-400); font-weight: 500; }
.toggle-group-arrow { font-size: 11px; color: var(--gray-400); transition: transform .2s; }
.toggle-group-arrow.open { transform: rotate(90deg); }
.toggle-group-body { display: none; padding: 6px 8px; }
.toggle-group-body.open { display: block; }
.company-num { font-size: 10px; color: var(--gray-400); width: 18px; flex-shrink: 0; text-align: right; }

/* ── Account table ── */
.account-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
.account-table th { background: var(--gray-100); padding: 10px 14px; font-size: 11px; font-weight: 800; text-align: left; color: var(--gray-600); letter-spacing: .05em; text-transform: uppercase; }
.account-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--gray-100); }
.account-table tr:last-child td { border-bottom: none; }
.account-table tr:hover td { background: #FAFAFA; }
.funnel-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #D1FAE5; color: #065F46; font-weight: 700; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: var(--radius-lg); padding: 28px; width: 440px; max-width: 95vw; box-shadow: var(--shadow-lg); }
.modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 20px; letter-spacing: -.3px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 800; color: var(--gray-600); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
.fg input, .fg select { width: 100%; padding: 9px 13px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; outline: none; transition: border-color .15s; background: white; font-family: inherit; color: var(--gray-800); }
.fg input:focus, .fg select:focus { border-color: var(--red); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── Stats bar ── */
.stats-bar { display: flex; gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--white); border-radius: var(--radius-md); padding: 16px 20px; flex: 1; box-shadow: var(--shadow-sm); transition: box-shadow .15s, transform .15s; border: 1px solid var(--gray-200); }
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.stat-card .label { font-size: 11px; color: var(--gray-400); font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
.stat-card .value { font-size: 26px; font-weight: 900; color: var(--gray-800); margin-top: 6px; letter-spacing: -.5px; }
.stat-card .sub { font-size: 11px; color: var(--gray-400); margin-top: 3px; }

/* ── Inbox ── */
.inbox-card { background: white; border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow-sm); border-left: 4px solid var(--gray-200); display: flex; gap: 16px; align-items: flex-start; border: 1px solid var(--gray-200); border-left-width: 4px; }
.inbox-card.source-slack  { border-left-color: #4A154B; }
.inbox-card.source-notion { border-left-color: #000; }
.inbox-card.source-gmail  { border-left-color: #EA4335; }
.inbox-card.source-manual { border-left-color: var(--red); }
.inbox-src-badge { padding: 3px 9px; border-radius: 99px; font-size: 10px; font-weight: 800; white-space: nowrap; flex-shrink: 0; margin-top: 2px; letter-spacing: .03em; }
.src-slack  { background: #F3E8F5; color: #4A154B; }
.src-notion { background: #F1F1F0; color: #37352F; }
.src-gmail  { background: #FCE8E6; color: #C5221F; }
.src-manual { background: var(--red-light); color: var(--red); }
.inbox-body { flex: 1; min-width: 0; }
.inbox-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--gray-800); letter-spacing: -.2px; }
.inbox-raw { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; max-height: 48px; overflow: hidden; text-overflow: ellipsis; }
.inbox-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.inbox-company-chip { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--gray-100); color: var(--gray-600); font-weight: 600; }
.inbox-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; margin-top: 2px; }
.im-check { accent-color: var(--red); width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; margin-top: 1px; }
.im-check-row { display: flex; align-items: flex-start; gap: 7px; padding: 6px 8px; border-radius: 6px; cursor: pointer; border: 1.5px solid transparent; transition: all .12s; }
.im-check-row:hover { background: var(--gray-100); }
.im-check-row.selected { background: var(--red-light); border-color: #FECACA; }
.im-check-row label { cursor: pointer; flex: 1; min-width: 0; }
.im-cname { font-size: 12px; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.im-ctrack { font-size: 10px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.im-cgrade { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
.im-grade-s { background: #EDE9FE; color: #6D28D9; }
.im-grade-a { background: #DBEAFE; color: #1D4ED8; }
.im-accounts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }

/* ── Detail panel ── */
#detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; backdrop-filter: blur(1px); }
#detail-overlay.open { display: block; }
#detail-panel { position: fixed; top: 0; right: -480px; width: 460px; height: 100vh; background: white; z-index: 201; box-shadow: -8px 0 40px rgba(0,0,0,.12); transition: right .25s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid var(--gray-200); }
#detail-panel.open { right: 0; }
#detail-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
#detail-header-info { flex: 1; min-width: 0; }
#detail-title { font-size: 16px; font-weight: 800; line-height: 1.3; margin-bottom: 6px; color: var(--gray-800); letter-spacing: -.3px; }
#detail-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#detail-close { width: 30px; height: 30px; border: none; background: var(--gray-100); border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--gray-600); transition: background .15s; }
#detail-close:hover { background: var(--gray-200); }
#detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 11px; font-weight: 800; color: var(--gray-400); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
.detail-company-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 7px; transition: background .1s; cursor: default; }
.detail-company-row:hover { background: var(--gray-100); }
.detail-company-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--gray-800); }
.detail-company-track { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
.detail-status-btn { border: none; border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 700; cursor: pointer; transition: transform .1s; white-space: nowrap; font-family: inherit; }
.detail-status-btn:hover { transform: scale(1.08); }
.dsb-not_started { background: var(--gray-100); color: var(--gray-600); }
.dsb-in_progress  { background: #FEF9C3; color: #92400E; }
.dsb-done         { background: #D1FAE5; color: #065F46; }
.dsb-na           { background: var(--gray-100); color: var(--gray-400); }
.detail-track-header { font-size: 10px; font-weight: 800; color: var(--gray-400); letter-spacing: .05em; padding: 10px 8px 4px; text-transform: uppercase; }
.detail-info-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
.detail-info-label { font-size: 11px; font-weight: 800; color: var(--gray-400); width: 56px; flex-shrink: 0; padding-top: 1px; }
.detail-info-val { font-size: 13px; color: var(--gray-800); flex: 1; }
.detail-task-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; background: var(--gray-100); }
.detail-task-title { flex: 1; font-size: 13px; font-weight: 600; }
.detail-progress-wrap { margin-bottom: 16px; }
.detail-progress-bar { background: var(--gray-200); border-radius: 99px; height: 6px; margin-bottom: 6px; }
.detail-progress-fill { border-radius: 99px; height: 6px; background: var(--red); transition: width .4s; }
.detail-progress-stats { display: flex; gap: 16px; }
.detail-stat { text-align: center; }
.detail-stat .n { font-size: 20px; font-weight: 900; color: var(--gray-800); letter-spacing: -.5px; }
.detail-stat .l { font-size: 10px; color: var(--gray-400); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 24px; color: var(--gray-400); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 13px; margin-top: 6px; }

/* ── Toast ── */
#toast { position: fixed; bottom: 28px; right: 28px; background: var(--gray-800); color: white; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 300; max-width: 320px; box-shadow: var(--shadow-lg); }
#toast.show { opacity: 1; }

@media (max-width: 768px) {
  .kanban-board { grid-template-columns: 1fr; }
  .stats-bar { flex-wrap: wrap; }
}
</style>
</head>
<body>

<header>
  <div class="logo">SPARTA <span class="logo-tag">AM 대시보드</span></div>
  <nav>
    <button class="active" onclick="showTab('kanban', this)">칸반</button>
    <button onclick="showTab('matrix', this)">매트릭스</button>
    <button onclick="showTab('accounts', this)">기업 관리</button>
    <button onclick="showTab('inbox', this)" id="nav-inbox">인박스 <span id="inbox-badge" style="display:none;background:#ef4444;color:white;border-radius:99px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:3px"></span></button>
  </nav>
  <div class="header-actions">
    <span id="sync-status"></span>
    <button id="sync-btn" onclick="syncSheets()">🔄 시트 싱크</button>
  </div>
</header>

<!-- ────────────── 칸반 탭 ────────────── -->
<div id="tab-kanban" class="tab active">
  <div class="sh">
    <h2>내 업무 보드</h2>
    <button class="btn btn-primary" onclick="openTaskModal()">+ 태스크 추가</button>
  </div>
  <div id="stats-bar" class="stats-bar"></div>
  <div class="kanban-board">
    <div class="kanban-col col-planned">
      <div class="kanban-col-header">
        <span class="kanban-col-title">📋 예정</span>
        <span class="kanban-count" id="cnt-planned">0</span>
      </div>
      <div id="col-planned"></div>
    </div>
    <div class="kanban-col col-in_progress">
      <div class="kanban-col-header">
        <span class="kanban-col-title">🔧 진행중</span>
        <span class="kanban-count" id="cnt-in_progress">0</span>
      </div>
      <div id="col-in_progress"></div>
    </div>
    <div class="kanban-col col-done">
      <div class="kanban-col-header">
        <span class="kanban-col-title">✅ 완료</span>
        <span class="kanban-count" id="cnt-done">0</span>
      </div>
      <div id="col-done"></div>

<script>
const STATUS_CYCLE = ['not_started','in_progress','done','na'];
const STATUS_EMOJI = { not_started:'⬜', in_progress:'🔄', done:'✅', na:'➖' };
const KANBAN_COLS  = ['planned','in_progress','done'];
const KANBAN_LABEL = { planned:'예정', in_progress:'진행중', done:'완료' };

let matrixData = { tasks:[], accounts:[], cell_map:{} };
let allTasks = [];

// ── Tab ──────────────────────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'kanban')   loadKanban();
  if (name === 'matrix')   loadMatrix();
  if (name === 'accounts') loadAccounts();
  if (name === 'inbox')    loadInbox();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function etaClass(due) {
  if (!due) return 'eta-none';
  const d = (new Date(due) - new Date(today())) / 86400000;
  if (d < 0)  return 'eta-overdue';
  if (d <= 3) return 'eta-soon';
  return 'eta-ok';
}
function etaLabel(due) {
  if (!due) return 'ETA 미설정';
  const d = Math.round((new Date(due) - new Date(today())) / 86400000);
  if (d < 0)  return `${Math.abs(d)}일 초과`;
  if (d === 0) return '오늘 마감';
  if (d === 1) return '내일 마감';
  return `D-${d}`;
}
function cardClass(due) {
  if (!due) return '';
  const d = (new Date(due) - new Date(today())) / 86400000;
  if (d < 0)  return 'overdue';
  if (d <= 3) return 'due-soon';
  return 'on-track';
}
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '–';
  const [,m,day] = d.split('-');
  return `${parseInt(m)}/${parseInt(day)}`;
}

// ── Sheets Sync ───────────────────────────────────────────────────────────────
async function syncSheets() {
  const el = document.getElementById('sync-status');
  el.textContent = '동기화 중...';
  document.getElementById('sync-btn').disabled = true;
  try {
    const r = await api('/api/sync', 'POST');
    if (r.ok) {
      el.textContent = `완료: +${r.added} 추가 / ${r.updated} 업데이트 / ${r.removed} 제거 (총 ${r.total}개)`;
      toast(`시트 싱크 완료: ${r.total}개 기업`);
      loadKanban(); loadMatrix(); loadAccounts();
    } else {
      el.textContent = '오류: ' + r.error;
      toast('싱크 실패: ' + r.error);
    }
  } finally {
    document.getElementById('sync-btn').disabled = false;
  }
}

// ── Kanban ────────────────────────────────────────────────────────────────────
async function loadKanban() {
  allTasks = await api('/api/tasks');
  renderKanban();
  renderStats();
}

function renderKanban() {
  const cols = { planned:[], in_progress:[], done:[] };
  allTasks.forEach(t => {
    const k = t.kanban_status || 'planned';
    (cols[k] = cols[k] || []).push(t);
  });

  KANBAN_COLS.forEach(col => {
    const list = cols[col] || [];
    document.getElementById('cnt-' + col).textContent = list.length;
    const el = document.getElementById('col-' + col);
    if (!list.length) {
      el.innerHTML = `<div style="text-align:center;padding:24px 0;color:#94a3b8;font-size:12px">태스크 없음</div>`;
      return;
    }
    el.innerHTML = list.map(t => renderCard(t)).join('');
  });
}

function renderCard(t) {
  const prevHtml = (t.preview_cells || []).map(c =>
    `<span class="kc-chip chip-${c.status}" title="${c.account_name}">${c.account_name}</span>`
  ).join('');

  const moveLeft  = KANBAN_COLS.indexOf(t.kanban_status || 'planned');
  const prevCol   = moveLeft > 0 ? KANBAN_COLS[moveLeft - 1] : null;
  const nextCol   = moveLeft < 2 ? KANBAN_COLS[moveLeft + 1] : null;
  const moveHtml  = `
    ${prevCol ? `<button class="btn btn-xs btn-ghost" onclick="moveTask(${t.id},'${prevCol}')">← ${KANBAN_LABEL[prevCol]}</button>` : ''}
    ${nextCol ? `<button class="btn btn-xs btn-primary" onclick="moveTask(${t.id},'${nextCol}')">${KANBAN_LABEL[nextCol]} →</button>` : ''}
  `;

  return `<div class="kanban-card ${cardClass(t.due_date)}" onclick="openTaskDetail(${t.id})" style="cursor:pointer">
    <div class="kc-title">${t.title}</div>
    <div class="kc-meta">
      <span class="eta-badge ${etaClass(t.due_date)}">${etaLabel(t.due_date)}</span>
      ${t.due_date ? `<span style="font-size:11px;color:#94a3b8">${fmtDate(t.due_date)}</span>` : ''}
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${t.pct}%"></div></div>
      <div class="progress-label">${t.done_count}/${t.account_count}개 기업 완료 · ${t.pct}%</div>
    </div>
    ${prevHtml ? `<div class="kc-preview">${prevHtml}</div>` : ''}
    <div class="kc-actions" onclick="event.stopPropagation()">
      <div class="kc-move">${moveHtml}</div>
      <button class="btn btn-xs btn-danger" onclick="deleteTask(${t.id})">삭제</button>
    </div>
  </div>`;
}

function renderStats() {
  const n = allTasks.length;
  const done = allTasks.filter(t => (t.kanban_status || 'planned') === 'done').length;
  const overdue = allTasks.filter(t => {
    if (!t.due_date) return false;
    return (new Date(t.due_date) - new Date(today())) / 86400000 < 0 && t.kanban_status !== 'done';
  }).length;
  const accounts = allTasks[0]?.account_count || 0;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card" style="cursor:pointer" onclick="openStatDetail('all')"><div class="label">전체 태스크</div><div class="value">${n}</div><div class="sub">등록된 업무</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="openStatDetail('done')"><div class="label">완료</div><div class="value" style="color:#059669">${done}</div><div class="sub">태스크 완료</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="openStatDetail('overdue')"><div class="label">기한 초과</div><div class="value" style="color:${overdue?'var(--red)':'var(--gray-800)'}">${overdue}</div><div class="sub">즉시 처리 필요</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="openStatDetail('accounts')"><div class="label">기업 수</div><div class="value">${accounts}</div><div class="sub">총 참여 기업</div></div>
  `;
}

async function moveTask(id, kanbanStatus) {
  await api(`/api/tasks/${id}/kanban`, 'PUT', { kanban_status: kanbanStatus });
  await loadKanban();
}

async function deleteTask(id) {
  if (!confirm('이 태스크를 삭제하면 모든 기업 태스크 상태도 삭제됩니다. 계속할까요?')) return;
  await api(`/api/tasks/${id}`, 'DELETE');
  toast('태스크 삭제됨');
  loadKanban();
}

// ── Matrix ────────────────────────────────────────────────────────────────────
async function loadMatrix() {
  matrixData = await api('/api/matrix');
  renderMatrix();
}

function renderMatrix() {
  const { tasks, accounts, cell_map } = matrixData;
  const head = document.getElementById('matrix-head');
  const body = document.getElementById('matrix-body');

  if (!tasks.length || !accounts.length) {
    head.innerHTML = '';
    body.innerHTML = `<tr><td colspan="99"><div class="empty"><div class="icon">📊</div><strong>데이터 없음</strong><p>태스크와 기업을 추가하거나 시트 싱크를 실행하세요.</p></div></td></tr>`;
    document.getElementById('matrix-summary').textContent = '';
    return;
  }

  let totalDone = 0;
  tasks.forEach(t => {
    t._done = accounts.filter(a => cell_map[`${a.id}_${t.id}`]?.status === 'done').length;
    totalDone += t._done;
  });
  const totalCells = tasks.length * accounts.length;
  document.getElementById('matrix-summary').textContent = `총 ${totalDone}/${totalCells} 완료`;

  head.innerHTML = `<tr>
    <th class="row-header">기업</th>
    ${tasks.map(t => {
      const pct = accounts.length ? Math.round(t._done / accounts.length * 100) : 0;
      return `<th class="task-col">${t.title}<span class="col-pct">ETA ${fmtDate(t.due_date)} · ${pct}%</span></th>`;
    }).join('')}
  </tr>`;

  let lastTrack = null, rows = '';
  accounts.forEach(a => {
    if (a.track_name && a.track_name !== lastTrack) {
      rows += `<tr class="track-row"><td colspan="${tasks.length+1}">${a.track_name}</td></tr>`;
      lastTrack = a.track_name;
    }
    rows += `<tr><td class="row-header">${gradeBadge(a.grade)}${a.name}</td>
      ${tasks.map(t => {
        const cell = cell_map[`${a.id}_${t.id}`] || {};
        const status = cell.status || 'not_started';
        return `<td><span class="status-cell s-${status}" onclick="toggleCell(${a.id},${t.id},'${status}')" title="${a.name} · ${t.title}">${STATUS_EMOJI[status]}</span></td>`;
      }).join('')}
    </tr>`;
  });
  body.innerHTML = rows;
}

async function toggleCell(accountId, taskId, currentStatus) {
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(currentStatus) + 1) % STATUS_CYCLE.length];
  const res = await api('/api/matrix/toggle', 'POST', { account_id:accountId, task_id:taskId, status:next });
  if (res.ok) {
    const key = `${accountId}_${taskId}`;
    if (!matrixData.cell_map[key]) matrixData.cell_map[key] = {};
    matrixData.cell_map[key].status = next;
    matrixData.cell_map[key].id = res.at_id;
    renderMatrix();
  }
}

// ── Accounts ──────────────────────────────────────────────────────────────────
async function loadAccounts() {
  const accounts = await api('/api/accounts');
  const el = document.getElementById('account-body');
  if (!accounts.length) {
    el.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="icon">🏢</div><strong>기업 없음</strong><p>시트 싱크 또는 직접 추가로 기업을 등록하세요.</p></div></td></tr>`;
    return;
  }
  el.innerHTML = accounts.map(a => {
    const badge = a.grade ? gradeBadge(a.grade) : '–';
    const funnel = a.funnel ? `<span class="funnel-badge">${a.funnel}</span>` : '–';
    return `<tr style="cursor:pointer" onclick="openAccountDetail(${a.id})">
      <td><strong>${a.name}</strong>${a.contact_name ? `<br><span style="font-size:11px;color:#64748b">${a.contact_name}</span>` : ''}</td>
      <td style="font-size:12px;color:#475569;max-width:200px">${a.track_name || '–'}</td>
      <td>${badge}</td>
      <td>${funnel}</td>
      <td style="font-size:12px">${a.contact_email || '–'}</td>
      <td onclick="event.stopPropagation()"><button class="btn btn-danger btn-sm" onclick="deleteAccount(${a.id})">삭제</button></td>
    </tr>`;
  }).join('');
}

async function deleteAccount(id) {
  if (!confirm('기업을 삭제하면 해당 기업의 모든 태스크 상태도 삭제됩니다. 계속할까요?')) return;
  await api(`/api/accounts/${id}`, 'DELETE');
  toast('기업 삭제됨');
  loadAccounts();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openTaskModal() {
  ['task-title','task-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('task-due').value = '';
  document.getElementById('task-modal').classList.add('open');
  setTimeout(() => document.getElementById('task-title').focus(), 50);
}
function openAccountModal() {
  ['acc-name','acc-track','acc-email'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('acc-grade').value = '';
  document.getElementById('account-modal').classList.add('open');
  setTimeout(() => document.getElementById('acc-name').focus(), 50);
}
function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

async function submitTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { alert('태스크명을 입력해주세요.'); return; }
  await api('/api/tasks','POST',{
    title,
    due_date: document.getElementById('task-due').value || null,
    description: document.getElementById('task-desc').value.trim()
  });
  closeModals(); toast('태스크 추가됨');
  loadKanban(); loadMatrix();
}

async function submitAccount() {
  const name = document.getElementById('acc-name').value.trim();
  if (!name) { alert('기업명을 입력해주세요.'); return; }
  await api('/api/accounts','POST',{
    name,
    track_name: document.getElementById('acc-track').value.trim() || null,
    grade: document.getElementById('acc-grade').value || null,
    contact_email: document.getElementById('acc-email').value.trim() || null
  });
  closeModals(); toast('기업 추가됨');
  loadAccounts(); loadKanban(); loadMatrix();
}

// ── Inbox ─────────────────────────────────────────────────────────────────────
let inboxCandidates = [];
let allAccountsCache = [];
let currentCandidateId = null;

async function loadInbox() {
  inboxCandidates = await api('/api/inbox');
  renderInbox();
  updateInboxBadge();
}

function updateInboxBadge() {
  const badge = document.getElementById('inbox-badge');
  const n = inboxCandidates.length;
  if (n > 0) {
    badge.textContent = n;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function renderInbox() {
  const el = document.getElementById('inbox-list');
  if (!inboxCandidates.length) {
    el.innerHTML = `<div class="empty"><div class="icon">📭</div><strong>후보 없음</strong><p>스캔 버튼을 눌러 Slack·Notion·Gmail을 읽어오거나, 아래에서 수동 추가해주세요.</p></div>`;
    return;
  }
  el.innerHTML = inboxCandidates.map(c => {
    const src = c.source || 'manual';
    const companies = (c.account_ids || []).map(id => {
      const a = allAccountsCache.find(x => x.id === id);
      return a ? `<span class="inbox-company-chip">${a.name}</span>` : '';
    }).join('');
    const eta = c.eta ? `<span class="eta-badge ${etaClass(c.eta)}">${etaLabel(c.eta)}</span>` : '';
    return `<div class="inbox-card source-${src}">

      </div>
      <div class="inbox-body">

        ${c.raw_text ? `<div class="inbox-raw">${c.raw_text}</div>` : ''}

}

async function runScan() {
  const el = document.getElementById('inbox-scan-status');
  el.textContent = '스캔 중...';
  const r = await api('/api/inbox/scan', 'POST');
  if (r.ok) {
    el.textContent = `완료: ${r.added}건 추가 (${r.scanned}개 메시지 분석)`;
    toast(`인박스 스캔 완료: ${r.added}건 추가`);

    el.textContent = '오류: ' + r.error;

async function openInboxModal(cid) {
  const c = inboxCandidates.find(x => x.id === cid);
  if (!c) return;
  currentCandidateId = cid;

  document.getElementById('im-source').textContent = c.source?.toUpperCase() || 'MANUAL';
  document.getElementById('im-raw').textContent = c.raw_text || '(원본 없음)';
  document.getElementById('im-title').value = c.title || '';
  document.getElementById('im-eta').value = c.eta || '';
  document.getElementById('im-search').value = '';

  // load accounts if not cached
  if (!allAccountsCache.length) {
    allAccountsCache = await api('/api/accounts');
  }
  renderInboxAccounts(c.account_ids || []);
  document.getElementById('inbox-modal').classList.add('open');
  setTimeout(() => document.getElementById('im-title').focus(), 50);
}

function renderInboxAccounts(selectedIds) {
  const wrap = document.getElementById('im-accounts');
  const query = document.getElementById('im-search').value.toLowerCase();
  const filtered = allAccountsCache.filter(a =>
    !query || a.name.toLowerCase().includes(query) ||
    (a.track_name || '').toLowerCase().includes(query)
  );
  if (!filtered.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:20px;color:#94a3b8;font-size:12px">검색 결과 없음</div>`;
    return;
  }
  const gradeBadge = g => {
    if (!g) return '';
    const cls = g === 'S' ? 'im-grade-s' : g === 'A' ? 'im-grade-a' : '';
    return cls ? `<span class="im-cgrade ${cls}">${g}</span>` : '';
  };
  wrap.innerHTML = `<div class="im-accounts-grid">` + filtered.map(a => {
    const checked = selectedIds.includes(a.id);
    const selCls  = checked ? ' selected' : '';
    const track   = a.track_name ? a.track_name.replace(/^\(.*?\)\s*/, '') : '';
    return `<div class="im-check-row${selCls}" onclick="toggleInboxAccount(${a.id},this)">
      <input type="checkbox" class="im-check" id="imc-${a.id}" ${checked?'checked':''} onclick="event.stopPropagation();updateSelectedCount()">
      <label for="imc-${a.id}" style="min-width:0">
        <div class="im-cname">${a.name}</div>
        ${track ? `<div class="im-ctrack">${track}</div>` : ''}
      </label>
      ${gradeBadge(a.grade)}
    </div>`;
  }).join('') + `</div>`;
  updateSelectedCount();
}

function filterInboxAccounts() {
  const c = inboxCandidates.find(x => x.id === currentCandidateId);
  const cur = getCheckedAccountIds();
  renderInboxAccounts(cur);
}

function toggleInboxAccount(id, row) {
  const cb = document.getElementById('imc-' + id);
  if (!cb) return;
  cb.checked = !cb.checked;
  row.classList.toggle('selected', cb.checked);
  updateSelectedCount();
}
function selectAllInbox() {
  document.querySelectorAll('#im-accounts input[type=checkbox]').forEach(cb => {
    cb.checked = true;
    cb.closest('.im-check-row')?.classList.add('selected');
  });
  updateSelectedCount();
}
function clearAllInbox() {
  document.querySelectorAll('#im-accounts input[type=checkbox]').forEach(cb => {
    cb.checked = false;
    cb.closest('.im-check-row')?.classList.remove('selected');
  });
  updateSelectedCount();
}

function getCheckedAccountIds() {
  return Array.from(document.querySelectorAll('#im-accounts input[type=checkbox]:checked'))
    .map(cb => parseInt(cb.id.replace('imc-', '')));
}

function updateSelectedCount() {
  document.getElementById('im-selected-count').textContent = getCheckedAccountIds().length;
}

async function confirmCandidate() {
  const title = document.getElementById('im-title').value.trim();
  if (!title) { alert('태스크 제목을 입력해주세요.'); return; }
  const account_ids = getCheckedAccountIds();
  const eta = document.getElementById('im-eta').value || null;
  const r = await api(`/api/inbox/${currentCandidateId}/confirm`, 'POST', { title, account_ids, eta });
  if (r.ok) {
    closeModals();
    toast(`태스크 추가됨: ${title}`);
    loadInbox(); loadKanban(); loadMatrix();
  } else {
    toast('오류: ' + r.error);
  }
}

async function quickDismiss(cid) {
  await api(`/api/inbox/${cid}`, 'DELETE');
  toast('무시됨');
  inboxCandidates = inboxCandidates.filter(c => c.id !== cid);

}

async function dismissCandidate() {
  await api(`/api/inbox/${currentCandidateId}`, 'DELETE');
  closeModals(); toast('무시됨');
  loadInbox();
}

// ── Grade badge helper ────────────────────────────────────────────────────────
function gradeBadge(g, size='10px') {
  if (!g) return '';
  const gs = g.trim();
  const isNamed = gs.includes('네임드') || gs.toLowerCase().includes('named');
  const hasA = gs.includes('(A)') || gs.toUpperCase() === 'A' || (isNamed && gs.includes('A'));
  const hasS = gs.toUpperCase() === 'S';
  const hasB = gs.toUpperCase() === 'B';

  let badges = '';
  if (isNamed) badges += `<span class="grade-named" style="font-size:${size};background:#fef9c3;color:#92400e">네임드</span>`;
  if (hasS)    badges += `<span class="grade-s" style="font-size:${size}">S</span>`;
  if (hasA || (!isNamed && gs.toUpperCase() === 'A')) badges += `<span class="grade-a" style="font-size:${size}">A</span>`;
  if (hasB)    badges += `<span class="grade-b" style="font-size:${size}">B</span>`;
  if (!badges) badges  = `<span class="grade-b" style="font-size:${size}">${gs.substring(0,3)}</span>`;
  return badges;
}

// ── Stat card detail ─────────────────────────────────────────────────────────
async function openStatDetail(type) {
  if (!allAccountsCache.length) allAccountsCache = await api('/api/accounts');
  if (!allTasks.length) allTasks = await api('/api/tasks');

  const KANBAN_LABEL = { planned:'예정', in_progress:'진행중', done:'완료' };
  const titles = { all:'전체 태스크', done:'완료된 태스크', overdue:'기한 초과 태스크', accounts:'참여 기업 목록' };

  let filtered, bodyHtml;

  if (type === 'accounts') {
    document.getElementById('detail-title').textContent = `기업 목록 (${allAccountsCache.length}개)`;
    document.getElementById('detail-meta').innerHTML = `<span style="font-size:12px;color:#64748b">클릭하면 기업 상세 정보</span>`;

    // Top-level grouping: AI캠퍼스 vs 고성과 vs 기타
    const topGroups = { 'AI 캠퍼스': [], '고성과': [], '기타': [] };
    allAccountsCache.forEach(a => {
      const tr = (a.track_name || '').toLowerCase();
      if (tr.includes('ai campus') || tr.includes('ai 캠퍼스')) topGroups['AI 캠퍼스'].push(a);
      else if (tr.includes('고성과')) topGroups['고성과'].push(a);
      else topGroups['기타'].push(a);
    });

    let num = 0;
    const groupIcons = { 'AI 캠퍼스': '🤖', '고성과': '⭐', '기타': '📁' };

    bodyHtml = Object.entries(topGroups).filter(([,accs]) => accs.length > 0).map(([gName, accs]) => {
      const gradeOrder = g => {
        if (!g) return 9;
        const gs = g.trim();
        if (gs.includes('네임드')) return 0;
        if (gs.toUpperCase() === 'S') return 1;
        if (gs.toUpperCase() === 'A' || gs.includes('(A)')) return 2;
        if (gs.toUpperCase() === 'B') return 3;
        return 8;
      };
      const tracks = {};
      accs.forEach(a => { const tr = a.track_name||'기타'; if(!tracks[tr]) tracks[tr]=[]; tracks[tr].push(a); });
      Object.values(tracks).forEach(list => list.sort((a,b) => gradeOrder(a.grade) - gradeOrder(b.grade)));
      const gId = 'tg-' + gName.replace(/\s/g,'');

      const subHtml = Object.entries(tracks).map(([tr, taccs], ti) => {
        const trackShort = tr.replace(/^\(.*?\)\s*/, '').replace(/과정$/, '').trim();
        const tId = gId + '-t' + ti;
        const companyRows = taccs.map(a => {
          num++;
          return `<div class="detail-company-row" style="cursor:pointer;padding-left:12px" onclick="closeDetail();setTimeout(()=>openAccountDetail(${a.id}),200)">
            <span class="company-num">${num}</span>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:4px">
                ${gradeBadge(a.grade,'9px')}
                <span class="detail-company-name">${a.name}</span>
              </div>
              ${a.contact_name||a.contact_email ? `<div style="font-size:10px;color:#94a3b8;margin-top:1px">${[a.contact_name,a.contact_email].filter(Boolean).join(' · ')}</div>` : ''}
            </div>
            ${a.funnel ? `<span class="funnel-badge" style="font-size:9px">${a.funnel}</span>` : ''}
          </div>`;
        }).join('');

        return `<div style="margin-bottom:4px;border:1px solid #f1f5f9;border-radius:8px;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f8fafc;cursor:pointer" onclick="toggleGroup('${tId}')">
            <span style="font-size:11px;font-weight:700;color:#475569">${trackShort}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:10px;color:#94a3b8">${taccs.length}개</span>
              <span class="toggle-group-arrow open" id="${tId}-arrow" style="font-size:10px">▶</span>
            </div>
          </div>
          <div class="toggle-group-body open" id="${tId}" style="padding:4px 6px">${companyRows}</div>
        </div>`;
      }).join('');

      return `<div class="toggle-group" style="margin-bottom:10px">
        <div class="toggle-group-header" onclick="toggleGroup('${gId}')">
          <div class="toggle-group-title">
            <span>${groupIcons[gName]}</span> ${gName}
            <span class="toggle-group-count">${accs.length}개 · ${Object.keys(tracks).length}개 트랙</span>
          </div>
          <span class="toggle-group-arrow open" id="${gId}-arrow">▶</span>
        </div>
        <div class="toggle-group-body open" id="${gId}" style="padding:8px">${subHtml}</div>
      </div>`;
    }).join('');
  } else {
    if (type === 'all') filtered = allTasks;
    else if (type === 'done') filtered = allTasks.filter(t => (t.kanban_status||'planned') === 'done');
    else if (type === 'overdue') filtered = allTasks.filter(t => {
      if (!t.due_date) return false;
      return (new Date(t.due_date) - new Date(today())) / 86400000 < 0 && t.kanban_status !== 'done';
    });

    document.getElementById('detail-title').textContent = `${titles[type]} (${filtered.length}개)`;
    document.getElementById('detail-meta').innerHTML = '';

    if (!filtered.length) {
      bodyHtml = `<div class="empty"><div class="icon">${type==='overdue'?'🎉':'📋'}</div><strong>${type==='overdue'?'기한 초과 없음':'태스크 없음'}</strong></div>`;
    } else {
      bodyHtml = `<div class="detail-section">` + filtered.map(t => {
        const kLabel = KANBAN_LABEL[t.kanban_status||'planned'];
        const kColor = t.kanban_status==='done'?'#059669':t.kanban_status==='in_progress'?'#d97706':'#1e40af';
        return `<div class="detail-task-row" style="cursor:pointer;margin-bottom:8px" onclick="closeDetail();setTimeout(()=>openTaskDetail(${t.id}),200)">
          <div style="flex:1">
            <div class="detail-task-title">${t.title}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">${t.done_count}/${t.account_count}개 완료 · ${t.pct}%</div>
          </div>
          ${t.due_date?`<span class="eta-badge ${etaClass(t.due_date)}" style="font-size:10px">${etaLabel(t.due_date)}</span>`:''}
          <span style="font-size:11px;font-weight:600;color:${kColor}">${kLabel}</span>
        </div>`;
      }).join('') + `</div>`;
    }
  }

  document.getElementById('detail-body').innerHTML = `<div class="detail-section">${bodyHtml}</div>`;
  openDetail();
}

  accounts.forEach(a => {

async function saveTaskEta(tid, dateVal) {
  await api(`/api/tasks/${tid}`, 'PUT', { due_date: dateVal || null });
  // update local cache
  const t = allTasks.find(x => x.id === tid);
  if (t) t.due_date = dateVal || null;
  // refresh eta badge in header
  const badge = document.querySelector('#detail-meta .eta-badge');
  if (badge) {
    badge.className = `eta-badge ${etaClass(dateVal)}`;
    badge.textContent = etaLabel(dateVal);
  }
  toast(dateVal ? `마감일 설정: ${dateVal}` : '마감일 제거됨');
  renderKanban();
}

async function cycleDetailStatus(accountId, taskId, currentStatus, btn) {
  const STATUS_LABEL = { not_started:'미시작', in_progress:'진행중', done:'완료', na:'해당없음' };
  const STATUS_CYCLE = ['not_started','in_progress','done','na'];
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(currentStatus) + 1) % STATUS_CYCLE.length];
  const res = await api('/api/matrix/toggle', 'POST', { account_id: accountId, task_id: taskId, status: next });
  if (res.ok) {
    const key = `${accountId}_${taskId}`;
    if (!matrixData.cell_map[key]) matrixData.cell_map[key] = {};
    matrixData.cell_map[key].status = next;
    matrixData.cell_map[key].id = res.at_id;
    btn.className = `detail-status-btn dsb-${next}`;
    btn.textContent = STATUS_LABEL[next];
    btn.setAttribute('onclick', `cycleDetailStatus(${accountId},${taskId},'${next}',this)`);
    // refresh kanban stats silently
    allTasks = await api('/api/tasks');
    renderKanban(); renderStats();
  }
}

// ── Account detail ────────────────────────────────────────────────────────────
async function openAccountDetail(aid) {
  if (!allAccountsCache.length) allAccountsCache = await api('/api/accounts');
  if (!matrixData.tasks.length)  matrixData = await api('/api/matrix');

  const a = allAccountsCache.find(x => x.id === aid);
  if (!a) return;

  const STATUS_LABEL = { not_started:'미시작', in_progress:'진행중', done:'완료', na:'해당없음' };
  const badge = a.grade ? `<span class="grade-${a.grade.toLowerCase()}">${a.grade}</span> ` : '';

  document.getElementById('detail-title').innerHTML = `${badge}${a.name}`;
  document.getElementById('detail-meta').innerHTML = `
    <span style="font-size:12px;color:#64748b">${a.track_name || ''}</span>
    ${a.funnel ? `<span class="funnel-badge">${a.funnel}</span>` : ''}
  `;

  const taskRows = matrixData.tasks.map(t => {
    const cell = matrixData.cell_map[`${aid}_${t.id}`] || {};
    const st = cell.status || 'not_started';
    return `<div class="detail-task-row">
      <div class="detail-task-title">${t.title}</div>
      ${t.due_date ? `<span style="font-size:11px;color:#94a3b8">${fmtDate(t.due_date)}</span>` : ''}
      <span class="eta-badge ${st==='done'?'eta-ok':st==='in_progress'?'eta-soon':'eta-none'}" style="font-size:10px">
        ${STATUS_LABEL[st]}
      </span>
    </div>`;
  }).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">기업 정보</div>
      ${a.contact_name ? `<div class="detail-info-row"><div class="detail-info-label">담당자</div><div class="detail-info-val">${a.contact_name}</div></div>` : ''}
      ${a.contact_email ? `<div class="detail-info-row"><div class="detail-info-label">이메일</div><div class="detail-info-val" style="word-break:break-all">${a.contact_email}</div></div>` : ''}
      ${a.funnel ? `<div class="detail-info-row"><div class="detail-info-label">퍼널</div><div class="detail-info-val">${a.funnel}</div></div>` : ''}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">태스크 현황 (${matrixData.tasks.length}개)</div>
      ${taskRows || '<div style="color:#94a3b8;font-size:13px">등록된 태스크 없음</div>'}
    </div>`;

  openDetail();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModals(); });
});
document.getElementById('task-modal').addEventListener('keydown', e => { if (e.key==='Enter') submitTask(); });
document.getElementById('account-modal').addEventListener('keydown', e => { if (e.key==='Enter') submitAccount(); });

// hash routing: localhost:5000/#inbox 로 접속하면 인박스 탭 자동 오픈
(function() {
  const hash = location.hash.slice(1);
  if (['kanban','matrix','accounts','inbox'].includes(hash)) {
    const btn = document.querySelector(`nav button[onclick*="'${hash}'"]`);
    showTab(hash, btn);
  } else {
    loadKanban();
  }
})();
// preload accounts cache and inbox badge on startup
api('/api/accounts').then(a => { allAccountsCache = a; });
api('/api/inbox').then(cs => { inboxCandidates = cs; updateInboxBadge(); });
</script>
</body>
</html>
